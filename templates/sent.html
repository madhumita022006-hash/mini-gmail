<!DOCTYPE html>
<html>
<head>
    <title>Sent Emails</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <button onclick="toggleDarkMode()" class="dark-mode-toggle">Dark Mode</button>
        <h2>Sent Emails</h2>

        {% if emails %}
        <ul>
            {% for email in emails %}
            <li>
                <strong>To:</strong> {{ email.ReceiverName }} ({{ email.ReceiverEmail }})<br>
                <strong>Subject:</strong> {{ email.Subject }}<br>
                <strong>Body:</strong> {{ email.Body }}<br>
                <strong>Date:</strong> {{ email.Timestamp }}<br>
                <hr>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No sent emails.</p>
        {% endif %}

        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        window.onload = () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            }
        };
    </script>
</body>
</html>
