<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <button onclick="toggleDarkMode()" class="dark-mode-toggle">Dark Mode</button>
        <h2>Welcome to Mini Gmail</h2>

        <ul>
            <li><a href="{{ url_for('inbox') }}">📥 Inbox</a></li>
            <li><a href="{{ url_for('sent') }}">📤 Sent</a></li>
            <li><a href="{{ url_for('contacts') }}">📇 Contacts</a></li>
            <li><a href="{{ url_for('send_email') }}">✉️ Compose Email</a></li>
            <li><a href="{{ url_for('logout') }}">🚪 Logout</a></li>
        </ul>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        window.onload = () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            }
        };
    </script>
</body>
</html>
