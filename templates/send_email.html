<!DOCTYPE html>
<html>
<head>
    <title>Compose Email - Mini Gmail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <button onclick="toggleDarkMode()" class="dark-mode-toggle">Dark Mode</button>
        <h2>Compose New Email</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul style="color: red;">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <!-- Updated Form with File Attachment -->
        <form method="POST" action="{{ url_for('send_email') }}" enctype="multipart/form-data">
            <label>To (Email):</label>
            <input
                type="email"
                name="receiver_email"
                value="{{ receiver_email|default('') }}"
                required
            ><br>

            <label>Subject:</label>
            <input
                type="text"
                name="subject"
                value="{{ subject|default('') }}"
                required
            ><br>

            <label>Body:</label>
            <textarea
                name="body"
                rows="5"
                required
            >{{ body|default('') }}</textarea><br>

            <!-- File upload input -->
            <label for="attachment">Attach File:</label>
            <input type="file" name="attachment"><br>

            <button type="submit">Send</button>
        </form>

        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        window.onload = () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            }
        };
    </script>
</body>
</html>
